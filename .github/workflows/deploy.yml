name: Build and Deploy

on:
  push:
    branches: [stable, staging]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/stable' && 'production' || (github.event_name == 'workflow_dispatch' && inputs.environment) || 'staging' }}
    outputs:
      environment: ${{ github.ref == 'refs/heads/stable' && 'production' || (github.event_name == 'workflow_dispatch' && inputs.environment) || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          QUICKSAVE_SIGNALING_URL: ${{ vars.SIGNAL_URL }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref == 'refs/heads/stable' && 'production' || 'staging' }}
          path: |
            apps/pwa/dist/
            apps/relay/dist/
          retention-days: 7

  deploy-staging:
    needs: build
    if: needs.build.outputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Trigger deploy
        if: vars.DEPLOY_URL != ''
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -X POST "$DEPLOY_URL" \
            -H "X-Deploy-Token: $DEPLOY_TOKEN" \
            -H "X-Run-ID: $RUN_ID" \
            --fail --silent --show-error

  deploy-production:
    needs: build
    if: needs.build.outputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger deploy
        if: vars.DEPLOY_URL != ''
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -X POST "$DEPLOY_URL" \
            -H "X-Deploy-Token: $DEPLOY_TOKEN" \
            -H "X-Run-ID: $RUN_ID" \
            --fail --silent --show-error
