name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish @sumicom/quicksave-shared
        run: pnpm --filter @sumicom/quicksave-shared publish --access public --no-git-checks

      - name: Publish @sumicom/quicksave-message-bus
        run: pnpm --filter @sumicom/quicksave-message-bus publish --access public --no-git-checks

      - name: Publish @sumicom/quicksave
        run: pnpm --filter @sumicom/quicksave publish --access public --no-git-checks
